name: python

on:
  push:
    branches: [main]
    paths:
      - 'langs/python/**'
      - 'vendor/vmx/**'
      - 'spec/**'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'langs/python/**'
      - 'vendor/vmx/**'
      - 'spec/**'
      - '.github/workflows/python.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: langs/python
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync
        run: uv sync --all-extras

      - name: Ruff (lint)
        run: uv run ruff check src tests

      - name: Ruff (format check)
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src tests

      - name: Test (pytest)
        run: uv run pytest tests/ -q --tb=short

      - name: Smoke test (web mode reachable)
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -e
          uv run guidearch --port 8765 &
          PID=$!
          # Poll instead of sleeping a fixed interval — NiceGUI startup time
          # varies on shared runners and a 5s sleep was occasionally flaky.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8765 >/dev/null 2>&1; then
              echo "Server up after ${i}s."
              kill $PID
              exit 0
            fi
            sleep 1
          done
          echo "Server did not respond within 30s." >&2
          kill $PID || true
          exit 1
