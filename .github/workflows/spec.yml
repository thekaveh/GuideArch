name: spec

on:
  push:
    branches: [main]
    paths:
      - 'spec/**'
      - 'langs/typescript/src/samples/scenario.schema.json'
      - '.github/workflows/spec.yml'
  pull_request:
    paths:
      - 'spec/**'
      - 'langs/typescript/src/samples/scenario.schema.json'
      - '.github/workflows/spec.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jsonschema (for schema validation step)
        run: pip install --quiet jsonschema

      - name: Validate JSON files parse
        run: |
          set -e
          # The `find ... | read` idiom used previously was a no-op: `read` in a
          # pipeline never sees the data and always exits non-zero, so the
          # validation block was dead code. Use `grep -q .` instead.
          if find spec -name '*.json' | grep -q .; then
            find spec -name '*.json' -exec sh -c 'python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$1"' _ {} \;
            echo "All spec/*.json files parse."
          else
            echo "No JSON files in spec/."
          fi

      - name: Validate conformance scenarios against scenario schema
        run: |
          set -e
          python3 << 'PY'
          import json, glob, jsonschema, sys
          schema = json.load(open('spec/domain/scenario.schema.json'))
          for f in sorted(glob.glob('spec/conformance/scenarios/*.json')):
              try:
                  jsonschema.validate(json.load(open(f)), schema)
                  print(f'{f}: VALID')
              except jsonschema.ValidationError as e:
                  print(f'{f}: INVALID — {e.message}', file=sys.stderr)
                  sys.exit(1)
          PY

      - name: Check ADR filenames are well-formed
        run: |
          set -e
          for f in spec/ADRs/*.md; do
            base=$(basename "$f")
            if ! [[ "$base" =~ ^[0-9]{4}-[a-z0-9-]+\.md$ ]]; then
              echo "Malformed ADR filename: $base" >&2
              exit 1
            fi
          done
          echo "All ADR filenames are well-formed."

      - name: Check TS bundled schema matches canonical spec schema
        run: |
          # langs/typescript/src/samples/scenario.schema.json is a hand-
          # maintained duplicate used by browser-mode Open (scenario-vm.ts
          # inlines it via import to avoid an fs read at runtime). Without a
          # gate the two silently drift apart on any spec/ edit. Until the
          # build is reworked to read the canonical file directly, this diff
          # is the cheapest way to keep them in lock-step.
          if ! diff -q spec/domain/scenario.schema.json \
                       langs/typescript/src/samples/scenario.schema.json >/dev/null; then
            echo "TS bundled schema has drifted from spec/domain/scenario.schema.json." >&2
            diff -u spec/domain/scenario.schema.json langs/typescript/src/samples/scenario.schema.json || true
            echo "Sync by copying spec/domain/scenario.schema.json over the langs/typescript/ copy." >&2
            exit 1
          fi
          echo "TS bundled schema matches canonical."
