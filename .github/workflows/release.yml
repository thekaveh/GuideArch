name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  # ─── 1. Tauri desktop installers (Win / macOS / Linux) ──────────────────────
  tauri-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: langs/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: langs/typescript/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri prereqs
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Upload Linux installers
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-linux
          path: |
            langs/typescript/src-tauri/target/release/bundle/appimage/*.AppImage
            langs/typescript/src-tauri/target/release/bundle/deb/*.deb

      - name: Upload macOS installer
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-macos
          path: |
            langs/typescript/src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Windows installers
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-windows
          path: |
            langs/typescript/src-tauri/target/release/bundle/msi/*.msi
            langs/typescript/src-tauri/target/release/bundle/nsis/*.exe

  # ─── 2. Avalonia desktop binaries (4 RIDs) ──────────────────────────────────
  avalonia-desktop:
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, osx-x64, osx-arm64, linux-x64]
        include:
          - rid: win-x64
            os: windows-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest
          - rid: linux-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: langs/csharp
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve VERSION from tag (or 'dev' on manual dispatch)
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish self-contained single-file binary
        run: >
          dotnet publish src/GuideArch.View
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -o publish/${{ matrix.rid }}

      - name: Zip artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../GuideArch-Avalonia-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip .

      - name: Zip artifact (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path publish\${{ matrix.rid }}\* `
            -DestinationPath GuideArch-Avalonia-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avalonia-${{ matrix.rid }}
          path: langs/csharp/GuideArch-Avalonia-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip

  # ─── 3. Python wheel + sdist ─────────────────────────────────────────────────
  python-package:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: langs/python
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build wheel and sdist
        run: uv build

      - name: Upload Python dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: langs/python/dist/

      # Optional PyPI publish — runs only on tag pushes and only when
      # PYPI_API_TOKEN is configured. spec/release.md §1.3 promises this
      # path; without an explicit publish step the wheel + sdist would only
      # ship via the GitHub release attachments.
      #
      # NB: must reference `secrets.PYPI_API_TOKEN` directly in the if:
      # condition. Step-level env: is applied AFTER the if: is evaluated,
      # so `env.PYPI_API_TOKEN` would always be empty at the gate — the
      # same trap we documented on the GHCR login step.
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.PYPI_API_TOKEN != '' }}
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          pip install --quiet twine
          twine upload --non-interactive --skip-existing \
              --username __token__ --password "$PYPI_API_TOKEN" dist/*

  # ─── 4. Python Docker image ───────────────────────────────────────────────────
  python-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (if token is available)
        # NB: must use secrets context directly here — step-level `env:` is
        # applied to the step's commands but the `if:` is evaluated before
        # `env:` takes effect, so `env.GHCR_TOKEN` would always be empty.
        if: ${{ secrets.GHCR_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Docker image (push if GHCR_TOKEN set)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: langs/python/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ secrets.GHCR_TOKEN != '' }}
          # Only tag :latest when this is a real tag push (refs/tags/v*).
          # A workflow_dispatch run produces version='dev'; without this
          # guard a manual smoke run would overwrite :latest with a dev
          # build silently.
          tags: |
            ghcr.io/thekaveh/guidearch:${{ steps.version.outputs.version }}
            ${{ startsWith(github.ref, 'refs/tags/v') && 'ghcr.io/thekaveh/guidearch:latest' || '' }}
          outputs: ${{ secrets.GHCR_TOKEN == '' && 'type=docker,dest=/tmp/guidearch-docker.tar' || '' }}

      - name: Upload Docker image tar (when not pushing)
        if: ${{ secrets.GHCR_TOKEN == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: python-docker-image
          path: /tmp/guidearch-docker.tar

  # ─── 5. SvelteKit static web bundle ──────────────────────────────────────────
  web-bundle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: langs/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: langs/typescript/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm build

      - name: Resolve VERSION from tag (or 'dev' on manual dispatch)
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Zip web bundle
        run: |
          cd build
          zip -r ../guidearch-web-${{ steps.version.outputs.version }}.zip .

      - name: Upload web bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: langs/typescript/guidearch-web-${{ steps.version.outputs.version }}.zip

  # ─── 6. Create GitHub Release ─────────────────────────────────────────────────
  release:
    # Only create a GitHub Release when triggered by a real tag push. On
    # workflow_dispatch the artifacts are still built (and uploadable as
    # workflow artifacts) but we don't want to publish a Release entry
    # for a version='dev' smoke run.
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - tauri-build
      - avalonia-desktop
      - python-package
      - python-docker
      - web-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve VERSION from tag (or 'dev' on manual dispatch)
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p flat-artifacts
          find release-artifacts -type f | while read f; do
            cp "$f" flat-artifacts/
          done
          ls -lh flat-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: flat-artifacts/*
          body: |
            ## GuideArch v${{ steps.version.outputs.version }}

            Fuzzy multi-criteria decision analysis for software architecture, shipped as three concurrent implementations sharing one spec.

            ### What's in this release

            All three implementations (TypeScript + Tauri 2, C# + Avalonia, Python + NiceGUI):

            - Full domain + TOPSIS engine (fuzzy ranking, sensitivity, constraint elimination counting)
            - Decision / alternative / property / coefficient editors
            - Results: ranked candidates table, critical decisions + constraints views
            - Analysis charts: ranked-candidates bar chart, fuzzy-value triangle visualizer

            See the [README](https://github.com/thekaveh/GuideArch#readme) for the complete feature description.

            ### Asset table

            | Artifact | Platform |
            |---|---|
            | `*.AppImage`, `*_amd64.deb` | Linux desktop (Tauri) |
            | `*.dmg` | macOS desktop (Tauri) |
            | `*-setup.exe`, `*.msi` | Windows desktop (Tauri) |
            | `guidearch-web-${{ steps.version.outputs.version }}.zip` | Web bundle (SvelteKit static) |
            | `GuideArch-Avalonia-${{ steps.version.outputs.version }}-win-x64.zip` | Windows desktop (Avalonia) |
            | `GuideArch-Avalonia-${{ steps.version.outputs.version }}-osx-x64.zip` | macOS x64 desktop (Avalonia) |
            | `GuideArch-Avalonia-${{ steps.version.outputs.version }}-osx-arm64.zip` | macOS arm64 desktop (Avalonia) |
            | `GuideArch-Avalonia-${{ steps.version.outputs.version }}-linux-x64.zip` | Linux desktop (Avalonia) |
            | `guidearch-${{ steps.version.outputs.version }}-py3-none-any.whl` | Python wheel |
            | `guidearch-${{ steps.version.outputs.version }}.tar.gz` | Python sdist |
            | `ghcr.io/thekaveh/guidearch:${{ steps.version.outputs.version }}` | Docker image (GHCR) |

            ### Known issues

            - **Unsigned binaries:** macOS users will need to right-click → Open the first time they launch the Tauri `.dmg` app (Gatekeeper warning). Windows SmartScreen may show a similar prompt. Code signing / notarization is deferred to v1.1.
            - Avalonia WebAssembly (browser) target is deferred to v1.1 — desktop-only Avalonia builds are included.
