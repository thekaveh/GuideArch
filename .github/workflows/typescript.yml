name: typescript

on:
  push:
    branches: [main]
    paths:
      - 'langs/typescript/**'
      - 'vendor/vmx/**'
      - 'spec/**'
      - '.github/workflows/typescript.yml'
  pull_request:
    paths:
      - 'langs/typescript/**'
      - 'vendor/vmx/**'
      - 'spec/**'
      - '.github/workflows/typescript.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: langs/typescript
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        # Pinned to a specific minor so a pnpm release can't silently change
        # builds (previously `version: latest` made runs non-deterministic).
        with:
          version: '9'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: langs/typescript/pnpm-lock.yaml

      - name: Install Linux Tauri prereqs
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type-check (.svelte + .ts)
        # svelte-check catches type errors inside .svelte component scripts
        # that eslint and vitest don't see — without this step, a bad type
        # in a +page.svelte block can land on main.
        run: pnpm check

      - name: Test (vitest)
        run: pnpm test

      - name: Build (web)
        run: pnpm build
