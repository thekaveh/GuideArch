name: typescript

on:
  push:
    branches: [main]
    paths:
      - 'langs/typescript/**'
      - 'vendor/vmx/**'
      - 'spec/**'
      - '.github/workflows/typescript.yml'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: langs/typescript
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4
        # Pinned to a specific minor so a pnpm release can't silently change
        # builds (previously `version: latest` made runs non-deterministic).
        with:
          version: '11'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: langs/typescript/pnpm-lock.yaml

      - name: Install Linux Tauri prereqs
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev \
            build-essential curl wget file libxdo-dev libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev

      # VMx-TS's package.json exports point at ./dist/index.{js,d.ts} but
      # its own .gitignore excludes dist/. A fresh submodule checkout has
      # no compiled output, so pnpm copies a dist-less package into its
      # .pnpm store and `pnpm check` (svelte-check) then resolves every
      # vmx export as `unknown` — cascading into 164 type errors across
      # src/viewmodels/, src/view/adapters/, and tests. Build VMx upstream
      # of the GuideArch pnpm install to populate the dist/ that pnpm
      # picks up. VMx uses npm + tsup; the build takes ~1.2 s.
      - name: Build VMx-TS dist
        working-directory: vendor/vmx/langs/typescript
        run: |
          npm ci
          npm run build

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type-check (.svelte + .ts)
        # svelte-check catches type errors inside .svelte component scripts
        # that eslint and vitest don't see — without this step, a bad type
        # in a +page.svelte block can land on main.
        run: pnpm check

      - name: Test (vitest)
        run: pnpm test

      - name: Build (web)
        run: pnpm build
