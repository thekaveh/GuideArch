name: vmx-bump

on:
  schedule:
    - cron: '0 8 * * 1'  # Mondays at 08:00 UTC
  workflow_dispatch:

# Workflow-scope default: read-only. The `check` job below overrides with the
# one write scope it needs (issue creation — nothing is ever pushed). Future
# jobs added without an explicit `permissions:` block will inherit read-only,
# not the repo's default GITHUB_TOKEN write scopes.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for newer VMx commit on main
        id: check
        # VMx publishes per-language tags (e.g., csharp-v1.0.0, python-v1.0.0,
        # typescript-v1.0.0) rather than a single repo-wide semver tag, so we
        # compare the pinned submodule commit against the upstream main HEAD.
        # If `main` has advanced past our pin, suggest bumping.
        run: |
          set -euo pipefail
          cd vendor/vmx
          git fetch origin main --tags
          CURRENT_SHA=$(git rev-parse HEAD)
          CURRENT_DESC=$(git describe --tags --always)
          UPSTREAM_SHA=$(git rev-parse origin/main)
          UPSTREAM_DESC=$(git describe --tags --always origin/main)
          echo "current_sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          echo "current_desc=$CURRENT_DESC" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$UPSTREAM_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_desc=$UPSTREAM_DESC" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT_SHA" != "$UPSTREAM_SHA" ] && git merge-base --is-ancestor "$CURRENT_SHA" "$UPSTREAM_SHA"; then
            echo "needs_bump=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue if bump available
        if: steps.check.outputs.needs_bump == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const currentSha = '${{ steps.check.outputs.current_sha }}';
            const currentDesc = '${{ steps.check.outputs.current_desc }}';
            const upstreamSha = '${{ steps.check.outputs.upstream_sha }}';
            const upstreamDesc = '${{ steps.check.outputs.upstream_desc }}';
            const shortCurrent = currentSha.substring(0, 8);
            const shortUpstream = upstreamSha.substring(0, 8);
            const title = `chore(vmx): bump submodule from ${shortCurrent} to ${shortUpstream}`;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'vmx-bump'
            });
            if (issues.data.find(i => i.title === title)) {
              core.info('Issue already open.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title,
              labels: ['vmx-bump'],
              body: `VMx submodule is pinned at \`${currentDesc}\` (\`${shortCurrent}\`), but upstream \`main\` is at \`${upstreamDesc}\` (\`${shortUpstream}\`).\n\nTo bump:\n\`\`\`bash\ncd vendor/vmx && git checkout ${upstreamSha} && cd ../..\ngit add vendor/vmx && git commit -m "build: bump VMx submodule to ${shortUpstream} (${upstreamDesc})"\n\`\`\``
            });
